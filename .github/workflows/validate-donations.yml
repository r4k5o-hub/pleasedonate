name: Validate Config Changes

on:
  pull_request:
    paths:
      - 'config.json'

jobs:
  validate-config:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON structure
        run: |
          python3 << 'EOF'
          import json
          import sys
          
          try:
              with open('config.json', 'r') as f:
                  config = json.loads(f.read())
              
              # Validate required top-level fields
              if 'donations' not in config:
                  print("❌ Error: 'donations' field is missing")
                  sys.exit(1)
              
              if not isinstance(config['donations'], list):
                  print("❌ Error: 'donations' must be an array")
                  sys.exit(1)
              
              # Validate each donation has required fields
              required_fields = ['id', 'name', 'description', 'url', 'platform']
              for idx, donation in enumerate(config['donations']):
                  for field in required_fields:
                      if field not in donation:
                          print(f"❌ Error: Donation #{idx} missing required field: {field}")
                          sys.exit(1)
              
              print(f"✅ JSON is valid with {len(config['donations'])} donations")
          except json.JSONDecodeError as e:
              print(f"❌ JSON parsing error: {e}")
              sys.exit(1)
          EOF

      - name: Summary
        if: success()
        run: |
          echo "✅ All validations passed!"
          echo "config.json is valid"
