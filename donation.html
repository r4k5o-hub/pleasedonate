<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Donation Details</title>
  <style>
    body{font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
    .container{max-width:900px;margin:0 auto;background:#fff;border-radius:10px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.12)}
    .back{display:inline-block;margin-bottom:16px;color:#667eea;text-decoration:none}
    .hero{display:flex;flex-direction:column;gap:16px}
    .hero img{width:100%;height:360px;object-fit:cover;border-radius:8px}
    h1{color:#333;margin:0}
    .meta{color:#666}
    .progress{margin:12px 0}
    .progress-bar{width:100%;height:12px;background:#e9e9e9;border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#667eea 0%,#764ba2 100%)}
    .actions{display:flex;gap:12px;margin-top:18px}
    .btn{padding:12px 18px;border-radius:6px;border:none;cursor:pointer;font-weight:600}
    .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;text-decoration:none}
    .btn-ghost{background:#f0f0f0;color:#333;text-decoration:none}
    .no-found{padding:40px;text-align:center;color:#666}
    @media(min-width:720px){.hero{flex-direction:row}.hero img{width:48%}.hero .details{width:52%}}
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">← Back to list</a>
    <div id="content">Loading…</div>
  </div>

  <script>
    async function loadConfig(){
      try{
        const res = await fetch('config.json',{cache:'no-store'});
        return await res.json();
      }catch(e){
        console.error(e);return null;
      }
    }

    function getQueryParam(name){
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function fmt(n){return n.toLocaleString ? n.toLocaleString() : n}

    (async function(){
      const cfg = await loadConfig();
      const id = getQueryParam('donationid') || getQueryParam('id');
      const langParam = getQueryParam('lang') || (cfg && cfg.site && cfg.site.language) || 'en';
      const t = (cfg && cfg.translations && cfg.translations[langParam]) || {};
      const container = document.getElementById('content');

      if(!cfg){ container.innerHTML = `<div class="no-found">${t.errorLoadingConfig || 'Error loading configuration.'}</div>`; return }
      const donation = (cfg.donations||[]).find(d=>String(d.id)===String(id));
      if(!donation){ container.innerHTML = `<div class="no-found">${t.donationNotFound || 'Donation not found. Return to the list.'}</div>`; return }

      // Attempt basic platform integration if donation.external.api_url is provided
      let externalData = null;
      if(donation.external && donation.external.api_url){
        try{
          const r = await fetch(donation.external.api_url);
          if(r.ok){
            externalData = await r.json();
            // Expect externalData to contain at least 'raised' and optional 'goal'
            if(externalData.raised) donation.raised = externalData.raised;
            if(externalData.goal) donation.goal = externalData.goal;
          }
        }catch(e){
          console.warn('External tracking fetch failed', e);
        }
      }

      const percent = Math.min(100, Math.round((donation.raised/donation.goal)*100));
      container.innerHTML = `
        <div class="hero">
          <img src="${donation.image}?v=${Date.now()}" alt="${donation.name}">
          <div class="details">
            <h1>${donation.name}</h1>
            <div class="meta">${t.category || 'Category'}: ${donation.category || 'N/A'} • ${t.urgency || 'Urgency'}: ${donation.urgency || 'N/A'}</div>
            <p style="margin-top:12px;color:#444">${donation.description || ''}</p>

            <div class="progress">
              <div style="display:flex;justify-content:space-between;color:#666;margin-bottom:8px">
                <div>${t.raised || 'Raised'}</div>
                <div><strong>$${fmt(donation.raised)} / $${fmt(donation.goal)}</strong></div>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
              <div style="text-align:right;color:#888;margin-top:6px">${percent}%</div>
            </div>

            <div class="actions">
              <a class="btn btn-primary" href="${donation.url}" target="_blank">${t.donate || 'Donate'}</a>
              <a class="btn btn-ghost" href="mailto:r4k5o-hub@example.com?subject=${encodeURIComponent((t.contactEmailSubject || 'Donation question for') + ' ' + donation.name)}">${t.contactOwner || 'Contact owner'}</a>
            </div>

            <div style="margin-top:18px;color:#777;font-size:0.95em">${t.suggestOpenIssue || 'If you have problems or want to suggest a donation, please open an issue or contact the owners listed in the repository.'}</div>
      `;

      if(!externalData){
        const note = document.createElement('div');
        note.style = 'margin-top:12px;color:#aa5500;font-size:0.95em';
        note.textContent = t.liveTrackingUnavailable || 'Live tracking not available for this platform.';
        container.querySelector('.details').appendChild(note);
      } else {
        const note = document.createElement('div');
        note.style = 'margin-top:12px;color:#337ab7;font-size:0.95em';
        note.textContent = `Live tracking: updated from ${donation.external && donation.external.provider || 'external source'}`;
        container.querySelector('.details').appendChild(note);
      }

    })();
  </script>
</body>
</html>
